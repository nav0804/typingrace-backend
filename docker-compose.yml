services:
  # 1. Your Spring Boot Backend
  backend:
    build: .
    restart: unless-stopped
    environment:
      # Railway sets the PORT dynamically, but Spring needs to know to use it
      - SERVER_PORT=${PORT:-8080}

      # Tell Spring Boot to look for the other containers by their service names
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    depends_on:
      - redis
      - kafka

  # 2. Redis Source of Truth
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # No exposed ports needed; the backend connects internally via 'redis:6379'

  # 3. Kafka Broadcaster
  kafka:
    image: apache/kafka:3.7.0
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Listen internally on all interfaces
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      # VERY IMPORTANT: Advertise the internal service name 'kafka' so Spring Boot can route to it
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'Jg0Q5xZ1Q-mU9Q_V1M0w1A'